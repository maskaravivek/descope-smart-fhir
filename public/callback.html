<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing Authentication</title>
    <script src="/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.5.2/build/fhir-client.js"></script>
</head>
<body>
    <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif;">
        <div style="text-align: center;">
            <h2>Processing Authentication...</h2>
            <p>Please wait while we complete the authorization.</p>
            <div style="margin-top: 20px;">
                <div style="width: 50px; height: 50px; border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
            </div>
        </div>
    </div>

    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <script>
        // Handle OAuth callback from Descope
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const error = urlParams.get('error');

        if (error) {
            document.body.innerHTML = `<div style="padding: 20px; color: red;">
                <h2>Authentication Error</h2>
                <p>${error}: ${urlParams.get('error_description') || 'Unknown error'}</p>
            </div>`;
        } else if (!code) {
            document.body.innerHTML = '<div style="padding: 20px; color: red;">Error: No authorization code received</div>';
        } else {
            // Successfully received authorization code from Descope
            console.log('Received authorization code from Descope');

            // Retrieve SMART launch parameters stored earlier
            const iss = sessionStorage.getItem('smart_iss');
            const launch = sessionStorage.getItem('smart_launch');

            if (!iss || !launch) {
                document.body.innerHTML = '<div style="padding: 20px; color: red;">Error: SMART launch parameters not found. Please restart from the EHR.</div>';
            } else {
                console.log('Proceeding to SMART OAuth flow with EHR...');

                // Get Descope configuration
                const { clientId, scopes } = window.DESCOPE_CONFIG;

                // Build scope string including SMART-specific scopes
                const smartScopes = [...scopes, 'fhirUser', 'launch/patient'].join(' ');

                // Now initiate SMART on FHIR OAuth flow with the EHR
                FHIR.oauth2.authorize({
                    clientId: clientId,
                    scope: smartScopes,
                    redirectUri: window.location.origin + "/index.html",
                    iss: iss,
                    launch: launch,
                    pkceMode: "required"
                }).catch(error => {
                    console.error('SMART OAuth error:', error);
                    document.body.innerHTML = `<div style="padding: 20px; color: red;">
                        <h2>SMART OAuth Error</h2>
                        <p>Failed to initiate SMART OAuth flow: ${error.message}</p>
                    </div>`;
                });
            }
        }
    </script>
</body>
</html>
