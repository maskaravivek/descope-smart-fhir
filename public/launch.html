<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART Launch</title>
    <script src="/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.5.2/build/fhir-client.js"></script>
</head>
<body>
    <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif;">
        <div style="text-align: center;">
            <h2>Launching SMART on FHIR App...</h2>
            <p>Please wait while we connect to your health records.</p>
            <div style="margin-top: 20px;">
                <div style="width: 50px; height: 50px; border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
            </div>
        </div>
    </div>

    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <script>
        // SMART on FHIR launch sequence through Descope Inbound App
        // The EHR will call this page with 'iss' and 'launch' parameters
        const urlParams = new URLSearchParams(window.location.search);
        const iss = urlParams.get("iss");
        const launch = urlParams.get("launch");

        if (!iss || !launch) {
            document.body.innerHTML = '<div style="padding: 20px; color: red;">Error: Missing required SMART launch parameters (iss and launch)</div>';
        } else {
            // Store launch parameters for use after Descope authentication
            sessionStorage.setItem('smart_iss', iss);
            sessionStorage.setItem('smart_launch', launch);

            console.log('Stored SMART params:', { iss, launch });
            console.log('Redirecting to Descope OAuth authorize...');

            // Get Descope configuration
            const { clientId, scopes } = window.DESCOPE_CONFIG;
            const redirectUri = window.location.origin + '/callback.html';

            // Join scopes array into space-separated string
            const scopeString = scopes.join(' ');

            // Build Descope OAuth authorize URL (for Inbound Apps, use /apps/ path)
            const authorizeUrl = new URL(`https://api.descope.com/oauth2/v1/apps/authorize`);
            authorizeUrl.searchParams.set('client_id', clientId);
            authorizeUrl.searchParams.set('redirect_uri', redirectUri);
            authorizeUrl.searchParams.set('response_type', 'code');
            authorizeUrl.searchParams.set('scope', scopeString);
            authorizeUrl.searchParams.set('state', Math.random().toString(36).substring(7));

            // Redirect to Descope Hosted Auth
            window.location.href = authorizeUrl.toString();
        }
    </script>
</body>
</html>
